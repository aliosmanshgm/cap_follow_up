<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÜRKİYE / USOAP CMA CAP İZLEME</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>

    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b; 
            --border: #e2e8f0; --primary: #2563eb; --danger: #ef4444; 
            --warn: #f59e0b; --ok: #10b981; --kanban-bg: #f1f5f9;
        }
        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8; 
            --border: #334155; --primary: #3b82f6; --kanban-bg: #0f172a;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 1600px; margin: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
        .tab-btn { background: transparent; color: var(--muted); border: none; font-size: 15px; font-weight: 700; padding: 12px 25px; cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.2s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: var(--card); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #loadingOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction:column; backdrop-filter: blur(3px); }
        .spinner { border: 5px solid var(--border); border-top: 5px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .ei-panel { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .ei-bar-wrapper { width: 100%; background: var(--border); height: 36px; border-radius: 18px; overflow: hidden; display: flex; margin: 20px 0; }
        .ei-bar-base { background: #64748b; height: 100%; display:flex; align-items:center; justify-content:center; color:white; font-size:13px; font-weight:bold; }
        .ei-bar-real { background: var(--ok); height: 100%; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 28px; color: var(--primary); }

        .controls { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
        .control-group label { font-weight: 600; font-size: 11px; color: var(--muted); text-transform: uppercase; }
        input[type="text"], input[type="file"] { padding: 9px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); width: 100%; }

        .table-wrapper { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.02); padding: 15px; text-align: left; font-size: 12px; color: var(--muted); border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .pq-group-row { background: var(--card); cursor: pointer; }
        .pq-detail-row { background: var(--kanban-bg); display: none; }
        .pq-detail-row.active { display: table-row; }
        
        .badge { display: inline-flex; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-ok { background: #d1e7dd; color: #0f5132; }
        .badge-danger { background: #fee2e2; color: #b91c1c; }

        .report-textarea { width: 100%; height: 150px; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .report-preview-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 25px; white-space: pre-wrap; font-size: 14px; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <h3 style="color:var(--primary); margin-top:15px;">Bulut Senkronizasyonu Aktif...</h3>
</div>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 24px;">✈️ TÜRKİYE / USOAP CMA CAP İZLEME</h1>
            <p id="mainSubtitle" style="margin:5px 0 0; color: var(--muted);">Veriler Firebase üzerinde güvenle saklanmaktadır.</p>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="clearAllData()" style="background: var(--danger);">🗑️ Tüm Verileri Sıfırla</button>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>1️⃣ Word Dosyaları (.docx)</label>
            <input type="file" id="docxInput" multiple accept=".docx">
        </div>
        <div class="control-group">
            <label>2️⃣ Excel Master Veri (.xlsx)</label>
            <input type="file" id="excelInput" accept=".xlsx, .xls">
        </div>
        <div class="control-group">
            <label>🔍 Ara</label>
            <input type="text" id="searchInput" oninput="render()">
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('dashboard')" id="btn-tab-dashboard">📊 Dashboard</button>
        <button class="tab-btn" onclick="switchTab('list')" id="btn-tab-list">📋 CAP Listesi</button>
        <button class="tab-btn" onclick="switchTab('report')" id="btn-tab-report">📈 Günlük Rapor</button>
    </div>

    <div id="tab-dashboard" class="tab-content active">
        <div class="ei-panel" id="eiPanel">
            <div>
                <h3>🌍 Genel EI Projeksiyonu</h3>
                <div class="ei-bar-wrapper">
                    <div class="ei-bar-base" id="barBase"></div>
                    <div class="ei-bar-real" id="barReal"></div>
                </div>
                <div id="eiText" style="font-weight: bold; margin-top: 10px;"></div>
            </div>
            <div><canvas id="eiChartCanvas" style="max-height: 200px;"></canvas></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><h3 id="totalPqCount">0</h3><p>Toplam PQ</p></div>
            <div class="stat-card"><h3 id="donePqCount">0</h3><p>Kapatılan PQ</p></div>
        </div>
    </div>

    <div id="tab-list" class="tab-content">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>PQ</th><th>Denetim Alanı</th><th>Durum</th><th>İşlem</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-report" class="tab-content">
        <textarea id="managementNotes" class="report-textarea" placeholder="Yönetici notlarını buraya ekleyin..."></textarea>
        <div class="report-preview-box" id="reportPreview"></div>
    </div>
</div>

<script>
    // --- SİZE ÖZEL FIREBASE AYARLARI ---
    const firebaseConfig = {
      apiKey: "AIzaSyBIey2A-LIZxq3pI2L1HAPUKM1Y46gERwg",
      authDomain: "icao-cap-takip.firebaseapp.com",
      databaseURL: "https://icao-cap-takip-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "icao-cap-takip",
      storageBucket: "icao-cap-takip.firebasestorage.app",
      messagingSenderId: "501420214187",
      appId: "1:501420214187:web:068e444ebd20c060a274ee",
      measurementId: "G-CW6XFRPVXX"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Global Değişkenler
    let rawData = []; let pqMasterData = {}; let baseEIData = {}; 
    let dailyReviewedPQs = new Set(); let dailyPQNotes = {};

    // --- FIREBASE VERİ OKUMA ---
    db.ref('icao_system').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            rawData = data.rawData || [];
            pqMasterData = data.pqMasterData || {};
            baseEIData = data.baseEIData || {};
            dailyReviewedPQs = new Set(data.dailyReviewedPQs || []);
            dailyPQNotes = data.dailyPQNotes || {};
            document.getElementById('managementNotes').value = data.managementNotes || "";
            render();
        }
    });

    // --- WORD DOSYASI OKUMA (TAM) ---
    document.getElementById('docxInput').addEventListener('change', async (e) => {
        showLoading();
        const files = e.target.files;
        for (let file of files) {
            const zip = await JSZip.loadAsync(file);
            const xml = await zip.file("word/document.xml").async("string");
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xml, "text/xml");
            
            // Basitleştirilmiş tablo okuma mantığı
            let currentPQ = file.name.match(/\d\.\d{3}/) ? file.name.match(/\d\.\d{3}/)[0] : "Bilinmeyen";
            const tables = xmlDoc.getElementsByTagName("w:tbl");
            for (let i = 0; i < tables.length; i++) {
                const rows = tables[i].getElementsByTagName("w:tr");
                for (let r = 0; r < rows.length; r++) {
                    const rCells = rows[r].getElementsByTagName("w:tc");
                    if (rCells.length >= 7) {
                        let step = rCells[0].textContent.trim();
                        if (/^\d+$/.test(step)) {
                            rawData.push({
                                pq: currentPQ,
                                step: step,
                                action: rCells[1].textContent.trim(),
                                office: rCells[2].textContent.trim(),
                                estDate: rCells[4].textContent.trim(),
                                progress: rCells[rCells.length-1].textContent.trim()
                            });
                        }
                    }
                }
            }
        }
        saveToFirebase();
    });

    // --- EXCEL DOSYASI OKUMA (TAM) ---
    document.getElementById('excelInput').addEventListener('change', async (e) => {
        showLoading();
        const file = e.target.files[0];
        const data = await file.arrayBuffer();
        const wb = XLSX.read(data);
        const ws = wb.Sheets[wb.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(ws);
        
        jsonData.forEach(row => {
            let pq = row["PQ No"] || row["PQ"] || row["PQ NO"];
            if(pq) pqMasterData[pq] = {
                alan: row["ALAN"] || row["AREA"] || row["DENETİM ALANI"],
                bulgu: row["BULGU"] || row["FINDING"] || row["AÇIKLAMA"]
            };
        });
        
        // EI Verisi varsa oku
        let eiSheet = wb.SheetNames.find(n => n.includes("EI"));
        if(eiSheet) {
            const wsEI = wb.Sheets[eiSheet];
            const eiData = XLSX.utils.sheet_to_json(wsEI);
            eiData.forEach(r => {
                baseEIData[r["ALAN"] || r["AREA"]] = { total: r["TOPLAM PQ"], sat: r["MEVCUT"] };
            });
        }
        saveToFirebase();
    });

    // --- FIREBASE VERİ YAZMA ---
    function saveToFirebase() {
        db.ref('icao_system').set({
            rawData: rawData,
            pqMasterData: pqMasterData,
            baseEIData: baseEIData,
            dailyReviewedPQs: Array.from(dailyReviewedPQs),
            dailyPQNotes: dailyPQNotes,
            managementNotes: document.getElementById('managementNotes').value
        }).then(() => hideLoading());
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        // Benzersiz PQ listesi oluştur
        const pqs = [...new Set(rawData.map(d => d.pq))];
        pqs.forEach(pq => {
            const excel = pqMasterData[pq] || {};
            const safeId = pq.replace(/\./g, '-');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><b>${pq}</b></td>
                <td>${excel.alan || '-'}</td>
                <td><span class="badge ${dailyReviewedPQs.has(pq) ? 'badge-ok' : 'badge-danger'}">${dailyReviewedPQs.has(pq) ? 'Kapatıldı' : 'Açık'}</span></td>
                <td><button onclick="togglePQRow('${safeId}')">Detay</button></td>
            `;
            tbody.appendChild(row);

            const detail = document.createElement('tr');
            detail.id = `detail-${safeId}`;
            detail.className = "pq-detail-row";
            detail.innerHTML = `
                <td colspan="4" style="padding:20px; background:#fdfdfd;">
                    <p><b>Bulgu:</b> ${excel.bulgu || 'Excel verisi yok.'}</p>
                    <label><input type="checkbox" onchange="toggleReport('${pq}')" ${dailyReviewedPQs.has(pq) ? 'checked' : ''}> Rapora/EI'ye Ekle</label>
                    <textarea style="width:100%; margin-top:10px;" onchange="updateNote('${pq}', this.value)" placeholder="PQ Notu...">${dailyPQNotes[pq] || ''}</textarea>
                </td>
            `;
            tbody.appendChild(detail);
        });
        updateDashboard();
        updateReport();
    }

    window.togglePQRow = (id) => document.getElementById(`detail-${id}`).classList.toggle('active');

    function toggleReport(pq) {
        if(dailyReviewedPQs.has(pq)) dailyReviewedPQs.delete(pq);
        else dailyReviewedPQs.add(pq);
        saveToFirebase();
    }

    function updateNote(pq, val) {
        dailyPQNotes[pq] = val;
        saveToFirebase();
    }

    function updateDashboard() {
        document.getElementById('totalPqCount').innerText = Object.keys(pqMasterData).length;
        document.getElementById('donePqCount').innerText = dailyReviewedPQs.size;
        // EI Projeksiyonu Hesaplama (Basit)
        if(Object.keys(baseEIData).length > 0) {
            document.getElementById('eiPanel').style.display = "grid";
            // ... detaylı EI çubuğu hesaplaması buraya gelecek ...
        }
    }

    function updateReport() {
        let text = "✈️ GÜNLÜK CAP TAKİP RAPORU\n\n";
        dailyReviewedPQs.forEach(pq => {
            text += `PQ ${pq}: ${dailyPQNotes[pq] || 'İşlem tamamlandı.'}\n`;
        });
        document.getElementById('reportPreview').innerText = text;
    }

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${id}`).classList.add('active');
        document.getElementById(`btn-tab-${id}`).classList.add('active');
    }

    function clearAllData() {
        if(confirm("Tüm bulut verileri silinecek! Emin misiniz?")) {
            db.ref('icao_system').remove().then(() => location.reload());
        }
    }

    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
</script>

</body>
</html>
