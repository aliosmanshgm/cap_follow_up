<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÜRKİYE / USOAP CMA CAP İZLEME</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>

    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b; 
            --border: #e2e8f0; --primary: #2563eb; --danger: #ef4444; 
            --warn: #f59e0b; --ok: #10b981; --kanban-bg: #f1f5f9;
        }
        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8; 
            --border: #334155; --primary: #3b82f6; --kanban-bg: #0f172a;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 1600px; margin: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
        .tab-btn { background: transparent; color: var(--muted); border: none; font-size: 15px; font-weight: 700; padding: 12px 25px; cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.2s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: var(--card); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #loadingOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction:column; backdrop-filter: blur(3px); }
        .spinner { border: 5px solid var(--border); border-top: 5px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .file-list-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .file-badge { display: inline-flex; align-items: center; background: var(--kanban-bg); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 11px; color: var(--text); }
        .file-remove-btn { margin-left: 6px; color: var(--danger); cursor: pointer; font-weight: bold; }

        .note-input { width: 100%; border: 1px dashed var(--border); background: var(--card); color: var(--text); padding: 8px; border-radius: 6px; font-size: 12px; resize: vertical; min-height: 40px; font-family: inherit; }
        .note-input:focus { border: 1px solid var(--primary); outline: none; background: var(--bg); }

        .ei-panel { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .ei-bar-wrapper { width: 100%; background: var(--border); height: 36px; border-radius: 18px; overflow: hidden; display: flex; margin: 20px 0; }
        .ei-bar-base { background: #64748b; height: 100%; display:flex; align-items:center; justify-content:center; color:white; font-size:13px; font-weight:bold; }
        .ei-bar-real { background: var(--ok); height: 100%; }
        .ei-bar-proj { background: var(--warn); height: 100%; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 28px; color: var(--primary); }

        .controls { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
        .control-group label { font-weight: 600; font-size: 11px; color: var(--muted); text-transform: uppercase; }
        
        input[type="text"], input[type="date"] { padding: 9px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); width: 100%; }
        input[type="file"] { padding: 6px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); cursor: pointer; width: 100%; }
        
        .checkbox-list { border: 1px solid var(--border); border-radius: 6px; background: var(--card); min-height: 90px; max-height: 120px; overflow-y: auto; padding: 5px; }
        .checkbox-list label { display: flex; align-items: center; gap: 8px; padding: 6px 8px; font-size: 13px; color: var(--text); border-radius: 4px; }

        button { background: var(--primary); color: white; border: none; padding: 9px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; white-space: nowrap; display:flex; align-items:center; gap:5px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        .table-wrapper { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: rgba(0,0,0,0.02); padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; color: var(--muted); border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .pq-group-row { background: var(--card); cursor: pointer; }
        .pq-group-row.active { background: var(--kanban-bg); border-left: 4px solid var(--primary); }
        .pq-detail-row { background: var(--kanban-bg); display: none; }
        .pq-detail-row.active { display: table-row; }
        
        .inner-steps-table { width: 100%; margin-top: 15px; background: var(--card); border-radius: 8px; overflow: hidden; }
        .inner-steps-table td { font-size: 13px; }
        
        .report-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .report-textarea { width: 100%; height: 150px; border: 1px solid var(--border); border-radius: 8px; padding: 15px; background: var(--kanban-bg); color: var(--text); }
        .report-preview-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 25px; overflow-y: auto; max-height: 800px; white-space: pre-wrap; }
        
        .review-card { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--primary); padding: 15px; border-radius: 6px; margin-bottom: 10px; }
        .ei-highlight-box { background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        
        .badge { display: inline-flex; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-danger { background: #fee2e2; color: #b91c1c; }
        .badge-ok { background: #d1e7dd; color: #0f5132; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <h3 style="color:var(--primary); margin-top:15px;">Veriler Bulutla Senkronize Ediliyor...</h3>
</div>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 24px;">✈️ TÜRKİYE / USOAP CMA CAP İZLEME</h1>
            <p id="mainSubtitle" style="margin:5px 0 0; color: var(--muted);" data-i18n="appSubtitle">Veri yükleme bekleniyor...</p>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-outline" onclick="toggleLang()">🌐 TR/EN</button>
            <button class="btn-outline" onclick="document.body.classList.toggle('dark-mode')" data-i18n="btnTheme">🌓 Tema</button>
            <button onclick="exportBackupExcel()" style="background: rgba(37, 99, 235, 0.1); color: var(--primary); border: 1px solid var(--primary);">📥 Seçimleri Yedekle</button>
            <button onclick="clearAllData()" style="background: var(--danger);">🗑️ Verileri Sıfırla</button>
        </div>
    </div>

    <div class="controls">
        <div class="control-group" style="flex: 1.5;">
            <label data-i18n="lblWord">1️⃣ Orijinal Word Dosyaları (.docx)</label>
            <input type="file" id="docxInput" multiple accept=".docx">
            <div id="wordFileList" class="file-list-container"></div>
        </div>
        <div class="control-group" style="flex: 1.5;">
            <label data-i18n="lblExcel">2️⃣ Excel Master Veri (.xlsx)</label>
            <input type="file" id="excelInput" accept=".xlsx, .xls">
            <div id="excelFileList" class="file-list-container"></div>
            <div id="eiStatusTxt" style="margin-top: 6px; font-size: 11px; display: none;"></div>
        </div>
        <div class="control-group">
            <label data-i18n="lblSearch">🔍 Ara</label>
            <input type="text" id="searchInput">
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('dashboard')" id="btn-tab-dashboard" data-i18n="tabDashboard">📊 Dashboard</button>
        <button class="tab-btn" onclick="switchTab('list')" id="btn-tab-list" data-i18n="tabList">📋 Detaylı Liste</button>
        <button class="tab-btn" onclick="switchTab('report')" id="btn-tab-report">📈 Günlük Rapor</button>
    </div>

    <div id="tab-dashboard" class="tab-content active">
        <div class="ei-panel" id="eiPanel" style="display: none;">
            <div>
                <h3 data-i18n="eiTitle">🌍 Genel EI Oranı (%)</h3>
                <div class="ei-bar-wrapper">
                    <div class="ei-bar-base" id="barBase" style="width:0%"></div>
                    <div class="ei-bar-real" id="barReal" style="width:0%"></div>
                </div>
                <div id="lblBase">Taban: %0</div>
                <div id="lblReal" style="color:var(--ok); font-weight:bold;">Mevcut: %0</div>
            </div>
            <div><canvas id="eiChartCanvas" style="max-height: 200px;"></canvas></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><h3 id="totalPqCount">0</h3><p data-i18n="statPqTotal">PQ</p></div>
            <div class="stat-card"><h3 id="doneCount">0</h3><p data-i18n="statDone">Kapatılan</p></div>
        </div>
        <div class="visual-area">
            <div class="stat-card"><canvas id="statusChart"></canvas></div>
            <div class="stat-card"><canvas id="officeChart"></canvas></div>
        </div>
    </div>

    <div id="tab-list" class="tab-content">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>PQ & Alan</th><th>İlerleme</th><th>Özet</th><th>Aksiyon</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-report" class="tab-content">
        <div class="report-layout">
            <div>
                <textarea id="managementNotes" class="report-textarea" placeholder="Günlük özetinizi buraya yazın..." oninput="updateReportPreview(); saveReportNotes();"></textarea>
                <button onclick="copyReportToClipboard()" style="width: 100%; background: #059669; padding: 12px;">📋 Raporu Kopyala</button>
            </div>
            <div class="report-preview-box" id="reportPreview"></div>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE KONFİGÜRASYONU ---
    const firebaseConfig = {
      apiKey: "AIzaSyBIey2A-LIZxq3pI2L1HAPUKM1Y46gERwg",
      authDomain: "icao-cap-takip.firebaseapp.com",
      databaseURL: "https://icao-cap-takip-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "icao-cap-takip",
      storageBucket: "icao-cap-takip.firebasestorage.app",
      messagingSenderId: "501420214187",
      appId: "1:501420214187:web:068e444ebd20c060a274ee",
      measurementId: "G-CW6XFRPVXX"
    };

    // Firebase'i Başlat
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Uygulama Değişkenleri
    let rawData = []; let pqMasterData = {}; let baseEIData = {}; let loadedFiles = new Set(); 
    let dailyReviewedPQs = new Set(); let dailyPQNotes = {}; let dailyReviewedSet = new Set();
    let currentLang = 'tr'; let window_loadedReportDate = null;

    // --- BULUT SENKRONİZASYONU (FIREBASE) ---
    function saveToFirebase() {
        showLoading();
        db.ref('icao_system').set({
            rawData: rawData,
            pqMasterData: pqMasterData,
            baseEIData: baseEIData,
            loadedFiles: Array.from(loadedFiles),
            dailyReviewedPQs: Array.from(dailyReviewedPQs),
            dailyReviewedSet: Array.from(dailyReviewedSet),
            dailyPQNotes: dailyPQNotes,
            managementNotes: document.getElementById('managementNotes').value
        }).then(() => hideLoading());
    }

    // Veriler değiştikçe anlık dinle (Real-time sync)
    db.ref('icao_system').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            rawData = data.rawData || [];
            pqMasterData = data.pqMasterData || {};
            baseEIData = data.baseEIData || {};
            loadedFiles = new Set(data.loadedFiles || []);
            dailyReviewedPQs = new Set(data.dailyReviewedPQs || []);
            dailyReviewedSet = new Set(data.dailyReviewedSet || []);
            dailyPQNotes = data.dailyPQNotes || {};
            document.getElementById('managementNotes').value = data.managementNotes || "";
            render();
            renderFileList();
        }
    });

    // --- UYGULAMA MANTIĞI ---
    function sortPQs(a, b) {
        let pa = a.split('.').map(Number); let pb = b.split('.').map(Number);
        if (pa[0] !== pb[0]) return pa[0] - pb[0];
        return pa[1] - pb[1];
    }

    function getStatus(d) {
        let p = d.progress.toLowerCase(); if (p.includes('completed') || p.includes('100')) return { label: 'Tamamlandı', color: 'ok', type: 'done' };
        if (d.estDate && parseDateObj(d.estDate) < new Date()) return { label: 'Gecikmiş', color: 'danger', type: 'late' };
        return { label: 'Bekliyor', color: 'warn', type: 'pending' };
    }

    function parseDateObj(txt) {
        if (!txt) return null; let m = txt.match(/(\d{1,2})[\.\/\-](\d{1,2})[\.\/\-](\d{2,4})/);
        if (m) return new Date(m[3], m[2]-1, m[1]); return null;
    }

    // --- UI RENDER ---
    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const groups = {}; 
        
        const filtered = rawData.filter(d => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            return d.pq.includes(search) || d.action.toLowerCase().includes(search);
        });

        filtered.forEach(d => { if(!groups[d.pq]) groups[d.pq] = []; groups[d.pq].push(d); });
        const sortedPQs = Object.keys(groups).sort(sortPQs);

        sortedPQs.forEach(pq => {
            const excel = pqMasterData[pq] || {};
            const safePqId = pq.replace(/\./g, '-');
            const doneActions = groups[pq].filter(x => getStatus(x).type === 'done').length;
            const progress = (doneActions / groups[pq].length) * 100;
            
            const headRow = document.createElement('tr');
            headRow.className = 'pq-group-row';
            headRow.id = `head-${safePqId}`;
            headRow.onclick = () => window.togglePQ(safePqId);
            headRow.innerHTML = `
                <td><b>${pq}</b><br><small>${excel.alan || '-'}</small></td>
                <td><div class="pq-progress-container"><div class="pq-progress-fill" style="width:${progress}%"></div></div></td>
                <td>${dailyReviewedPQs.has(pq) ? '✅ Raporda' : ''}</td>
                <td style="text-align:center;">🔽</td>
            `;
            tbody.appendChild(headRow);

            const detailRow = document.createElement('tr');
            detailRow.className = 'pq-detail-row';
            detailRow.id = `detail-${safePqId}`;
            
            let isPqRepChecked = dailyReviewedPQs.has(pq) ? "checked" : "";
            detailRow.innerHTML = `
                <td colspan="4">
                    <div style="padding:20px; border-left:4px solid var(--primary);">
                        <p><b>Bulgu:</b> ${excel.bulgu || 'N/A'}</p>
                        <label style="background:rgba(16,185,129,0.1); padding:10px; border-radius:8px; cursor:pointer; display:block; margin-bottom:15px;">
                            <input type="checkbox" onchange="toggleDailyReportPQ('${pq}', this.checked)" ${isPqRepChecked}> 
                            📈 Bu PQ'yu Tamamlandı Olarak Günlük Rapora Ekle (EI'ye Yansıt)
                        </label>
                        <textarea class="note-input" placeholder="PQ Özel Notu..." onchange="updatePQNote('${pq}', this.value)">${dailyPQNotes[pq] || ""}</textarea>
                    </div>
                </td>
            `;
            tbody.appendChild(detailRow);
        });

        calculateStats();
    }

    function toggleDailyReportPQ(pq, isChecked) {
        if(isChecked) dailyReviewedPQs.add(pq); else dailyReviewedPQs.delete(pq);
        saveToFirebase();
    }

    function updatePQNote(pq, val) {
        dailyPQNotes[pq] = val;
        saveToFirebase();
    }

    window.togglePQ = function(id) {
        document.getElementById(`head-${id}`).classList.toggle('active');
        document.getElementById(`detail-${id}`).classList.toggle('active');
    };

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${id}`).classList.add('active');
        document.getElementById(`btn-tab-${id}`).classList.add('active');
    }

    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

    // Rapor ve Diğer Fonksiyonlar
    function updateReportPreview() {
        const preview = document.getElementById('reportPreview');
        let html = "📅 GÜNLÜK OFF-SITE DURUM RAPORU\n\n";
        
        let reportEICalcs = {};
        Object.keys(baseEIData).forEach(area => {
            let added = Array.from(dailyReviewedPQs).filter(pq => pqMasterData[pq] && pqMasterData[pq].alan === area).length;
            let base = ((baseEIData[area].sat / baseEIData[area].total) * 100).toFixed(2);
            let current = (((baseEIData[area].sat + added) / baseEIData[area].total) * 100).toFixed(2);
            html += `${area}: %${base} ➔ %${current} (+${added} PQ)\n`;
        });

        html += "\n📌 NOTLAR:\n" + document.getElementById('managementNotes').value + "\n\n";
        html += "✅ KAPATILAN PQ DETAYLARI:\n";
        dailyReviewedPQs.forEach(pq => {
            html += `- PQ ${pq}: ${dailyPQNotes[pq] || 'Açıklama yok.'}\n`;
        });

        preview.innerText = html;
    }

    function calculateStats() {
        document.getElementById('totalPqCount').innerText = Object.keys(pqMasterData).length;
        document.getElementById('doneCount').innerText = dailyReviewedPQs.size;
    }

    // Dosya İşlemleri & Lang Switchers (Eski sürümlerdeki mantıkla aynı)
    // ... Word/Excel Parsing Logic ...

</script>
</body>
</html>
